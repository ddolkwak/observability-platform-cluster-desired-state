# Migrated from ~/ansible/roles/nfs-provisioner
# NFS-Provisioner Application Definition File
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-provisioner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/'
    chart: nfs-subdir-external-provisioner
    targetRevision: 4.0.18
    helm:
      valuesObject:
        nfs:
          server: 192.168.56.133
          path: /srv/nfs_shared/kubernetes
        storageClass:
          name: nfs-storage
          defaultClass: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nfs-provisioner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true