# Postgres Application Deployment 
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:ddolkwak/observability-platform-cluster-desired-state.git'
    targetRevision: HEAD
    path: manifests/workloads/postgres/base
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true