apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-infra-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:ddolkwak/observability-platform-cluster-desired-state.git'
    targetRevision: HEAD
    path: apps/infra
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true